<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roleta da Sorte — Grupo Kuhn</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --verde:     #00C853;
  --verde-esc: #00952E;
  --rosa:      #FF4081;
  --rosa-esc:  #C2185B;
  --azul:      #40C4FF;
  --preto:     #1A1A2E;
  --branco:    #FFFFFF;
  --cinza-bg:  #F0F4FF;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--preto);
  min-height: 100vh;
  overflow-x: hidden;
}

/* FUNDO COM PADRÃO DE BOLINHAS CARTOON */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(0,200,83,.15) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(255,64,129,.15) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(64,196,255,.08) 0%, transparent 60%),
    var(--preto);
  z-index: 0;
}

/* ESTRELINHAS FLUTUANDO */
.star-deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: floatStar 5s ease-in-out infinite;
  opacity: 0.25;
  font-size: 1.5rem;
}
.star-deco:nth-child(1){top:8%;left:6%;animation-delay:0s}
.star-deco:nth-child(2){top:20%;right:7%;animation-delay:.8s;font-size:1.1rem}
.star-deco:nth-child(3){top:55%;left:4%;animation-delay:1.6s;font-size:2rem}
.star-deco:nth-child(4){top:65%;right:6%;animation-delay:.4s;font-size:1.3rem}
.star-deco:nth-child(5){bottom:15%;left:12%;animation-delay:2s;font-size:1.8rem}
.star-deco:nth-child(6){bottom:8%;right:15%;animation-delay:1.2s;font-size:1rem}

@keyframes floatStar {
  0%,100%{ transform: translateY(0) rotate(0deg); }
  50%{ transform: translateY(-12px) rotate(20deg); }
}

.container {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 20px 16px 40px;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 24px;
  animation: slideDown .6s ease;
}
@keyframes slideDown {
  from{ opacity:0; transform:translateY(-30px); }
  to{ opacity:1; transform:translateY(0); }
}

.logo-area {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--verde), var(--verde-esc));
  border-radius: 20px;
  padding: 12px 20px;
  box-shadow: 0 0 0 3px rgba(0,200,83,.3), 0 8px 24px rgba(0,200,83,.4);
  margin-bottom: 14px;
}
.logo-text-wrap { text-align: left; }
.logo-small { font-family:'Fredoka One',cursive; font-size:.85rem; color:rgba(255,255,255,.8); letter-spacing:2px; }
.logo-big   { font-family:'Fredoka One',cursive; font-size:1.9rem; color:white; line-height:1; }

/* Ícone PPG estilizado com SVG inline */
.ppg-icon { font-size:2.2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }

.title-main {
  font-family: 'Fredoka One', cursive;
  font-size: 2.4rem;
  color: white;
  line-height: 1;
  text-shadow: 3px 3px 0 var(--rosa), 6px 6px 0 rgba(255,64,129,.3);
}
.title-main span { color: var(--verde); text-shadow: 3px 3px 0 #005C25, 6px 6px 0 rgba(0,200,83,.3); }
.subtitle {
  font-size: .9rem;
  color: rgba(255,255,255,.6);
  margin-top: 6px;
  font-weight: 700;
  letter-spacing: .5px;
}

/* ── CARD ── */
.card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 28px 24px;
  border: 2px solid rgba(0,200,83,.3);
  box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
}
.card-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--verde);
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 0 0 20px rgba(0,200,83,.5);
}
.card-sub { font-size:.85rem; color:rgba(255,255,255,.5); text-align:center; margin-bottom:20px; }

.field-group { margin-bottom:14px; }
label {
  display: block;
  font-size: .75rem;
  font-weight: 900;
  color: rgba(255,255,255,.7);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
input[type="text"] {
  width: 100%;
  padding: 13px 16px;
  border: 2px solid rgba(0,200,83,.25);
  border-radius: 14px;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  color: white;
  background: rgba(255,255,255,.08);
  outline: none;
  transition: all .2s;
}
input[type="text"]:focus {
  border-color: var(--verde);
  background: rgba(0,200,83,.1);
  box-shadow: 0 0 0 4px rgba(0,200,83,.15);
}
input[type="text"]::placeholder { color:rgba(255,255,255,.25); font-weight:400; }

.btn-primary {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--verde), var(--verde-esc));
  color: white;
  border: none;
  border-radius: 16px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,200,83,.5), 0 0 0 3px rgba(0,200,83,.2);
  transition: all .2s;
  margin-top: 8px;
  letter-spacing: .5px;
}
.btn-primary:active { transform: scale(.97); }
.btn-primary:disabled { background: #444; box-shadow: none; cursor: not-allowed; color: #888; }

.error-msg {
  background: rgba(255,64,129,.15);
  border: 1px solid var(--rosa);
  border-radius: 12px;
  padding: 12px 16px;
  color: #FF80AB;
  font-size: .9rem;
  font-weight: 700;
  text-align: center;
  margin-top: 12px;
  animation: shake .4s ease;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

/* ── TELAS ── */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn .5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ── BADGE VENDEDOR ── */
.vendedor-badge {
  background: linear-gradient(135deg, rgba(0,200,83,.2), rgba(255,64,129,.2));
  border: 2px solid rgba(0,200,83,.4);
  border-radius: 50px;
  padding: 10px 20px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 4px 14px rgba(0,0,0,.3);
}
.vendedor-badge span { font-size:.75rem; color:rgba(255,255,255,.6); font-weight:800; text-transform:uppercase; letter-spacing:1px; }
.vendedor-badge strong { display:block; font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--verde); line-height:1.1; text-shadow:0 0 16px rgba(0,200,83,.6); }

/* ── ROLETA ── */
.wheel-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}
.wheel-arrow {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.6));
}
.wheel-wrapper {
  position: relative;
  width: 320px; height: 320px;
  border-radius: 50%;
  box-shadow:
    0 0 0 5px var(--preto),
    0 0 0 8px var(--verde),
    0 0 0 11px var(--preto),
    0 0 40px rgba(0,200,83,.5),
    0 12px 40px rgba(0,0,0,.6);
}
#wheel-canvas { width:320px; height:320px; border-radius:50%; display:block; }
.wheel-center {
  position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width: 58px; height: 58px;
  background: var(--preto);
  border-radius: 50%;
  border: 4px solid var(--verde);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 0 0 3px var(--preto), 0 0 20px rgba(0,200,83,.6);
  z-index: 5;
}

.btn-spin {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--rosa), var(--rosa-esc));
  color: white;
  border: none;
  border-radius: 16px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,64,129,.5), 0 0 0 3px rgba(255,64,129,.2);
  transition: all .2s;
  margin-top: 16px;
  letter-spacing: .5px;
}
.btn-spin:active { transform: scale(.97); }
.btn-spin:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

/* ── RESULTADO ── */
.resultado-card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  overflow: hidden;
  border: 2px solid rgba(0,200,83,.3);
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
  margin-bottom: 16px;
}
.resultado-header {
  background: linear-gradient(135deg, var(--verde-esc), var(--verde));
  padding: 28px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.resultado-header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,.15), transparent 60%);
}
.resultado-emoji { font-size:3.5rem; display:block; margin-bottom:6px; animation:bounceIn .6s ease; }
@keyframes bounceIn { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
.resultado-titulo { font-family:'Fredoka One',cursive; font-size:1.1rem; color:rgba(255,255,255,.85); }
.resultado-premio { font-family:'Fredoka One',cursive; font-size:2rem; color:white; line-height:1.1; margin-top:4px; text-shadow:2px 2px 0 rgba(0,0,0,.3); }

.resultado-body { padding:20px; }
.info-row {
  display: flex; justify-content:space-between; align-items:center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.08);
  font-size: .9rem;
}
.info-row:last-child { border-bottom: none; }
.info-label { color:rgba(255,255,255,.4); font-weight:800; text-transform:uppercase; font-size:.72rem; letter-spacing:.5px; }
.info-value { font-weight:800; color:white; text-align:right; max-width:65%; }

.codigo-cupom {
  background: rgba(0,200,83,.08);
  border: 2px dashed rgba(0,200,83,.5);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  margin: 16px 0 4px;
}
.codigo-label { font-size:.72rem; font-weight:900; color:rgba(0,200,83,.7); text-transform:uppercase; letter-spacing:1px; }
.codigo-valor { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--verde); letter-spacing:3px; text-shadow:0 0 20px rgba(0,200,83,.5); }

/* ── UTILS ── */
.loading {
  display: inline-block; width:18px; height:18px;
  border: 3px solid rgba(255,255,255,.3); border-top-color:white;
  border-radius: 50%; animation: spin .8s linear infinite;
  vertical-align: middle; margin-right:8px;
}
@keyframes spin { to{ transform:rotate(360deg) } }

.confetti-piece {
  position: fixed; top:-10px; border-radius: 2px;
  animation: confettiFall linear forwards;
  pointer-events: none; z-index:999;
}
@keyframes confettiFall {
  0%{ transform:translateY(0) rotate(0deg); opacity:1 }
  100%{ transform:translateY(100vh) rotate(720deg); opacity:0 }
}
</style>
</head>
<body>

<!-- ESTRELAS DECORATIVAS -->
<div class="star-deco">⚡</div>
<div class="star-deco">✨</div>
<div class="star-deco">💥</div>
<div class="star-deco">⭐</div>
<div class="star-deco">💫</div>
<div class="star-deco">🌟</div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-area">
      <div class="ppg-icon">👊</div>
      <div class="logo-text-wrap">
        <div class="logo-small">GRUPO</div>
        <div class="logo-big">KUHN</div>
      </div>
    </div>
    <div class="title-main">Roleta da <span>Sorte</span></div>
    <div class="subtitle">⚡ Gire e descubra seu prêmio! ⚡</div>
  </div>

  <!-- TELA 1: LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="card">
      <div class="card-title">💚 Hora de girar!</div>
      <div class="card-sub">Preencha seus dados para liberar a roleta</div>
      <div class="field-group">
        <label>👤 Seu nome</label>
        <input type="text" id="input-nome" placeholder="Como você se chama?" autocomplete="off">
      </div>
      <div class="field-group">
        <label>📍 Sua loja</label>
        <input type="text" id="input-loja" placeholder="Ex: Altamira" autocomplete="off">
      </div>
      <div class="field-group">
        <label>💸 Seu PIX</label>
        <input type="text" id="input-pix" placeholder="CPF, e-mail ou telefone" autocomplete="off">
      </div>
      <div class="field-group">
        <label>🔑 Senha da campanha</label>
        <input type="text" id="input-senha" placeholder="Ex: Lindinha-123" autocomplete="off">
      </div>
      <button class="btn-primary" id="btn-entrar" onclick="validarAcesso()">Confirmar</button>
      <div id="error-login" class="error-msg" style="display:none"></div>
    </div>
  </div>

  <!-- TELA 2: ROLETA -->
  <div id="screen-roleta" class="screen">
    <div class="vendedor-badge">
      <span>Participante</span>
      <strong id="nome-display">—</strong>
    </div>
    <div class="wheel-container">
      <!-- SETA ROSA -->
      <svg class="wheel-arrow" width="44" height="54" viewBox="0 0 44 54">
        <polygon points="22,0 42,42 22,30 2,42" fill="#FF4081" stroke="#1A1A2E" stroke-width="2.5"/>
        <circle cx="22" cy="42" r="11" fill="#FF4081" stroke="#1A1A2E" stroke-width="2.5"/>
        <circle cx="22" cy="42" r="5" fill="white" opacity=".6"/>
      </svg>
      <div class="wheel-wrapper">
        <canvas id="wheel-canvas" width="320" height="320"></canvas>
        <div class="wheel-center">💥</div>
      </div>
    </div>
    <button class="btn-spin" id="btn-spin" onclick="girarRoleta()">
      ⚡ GIRAR A ROLETA! ⚡
    </button>
  </div>

  <!-- TELA 3: RESULTADO -->
  <div id="screen-resultado" class="screen">
    <div class="resultado-card">
      <div class="resultado-header">
        <span class="resultado-emoji" id="res-emoji">🎉</span>
        <div class="resultado-titulo">Parabéns! Você ganhou:</div>
        <div class="resultado-premio" id="res-premio">—</div>
      </div>
      <div class="resultado-body">
        <div class="info-row"><span class="info-label">Vendedor</span><span class="info-value" id="res-vendedor">—</span></div>
        <div class="info-row"><span class="info-label">Loja</span><span class="info-value" id="res-loja">—</span></div>
        <div class="info-row"><span class="info-label">PIX</span><span class="info-value" id="res-pix">—</span></div>
        <div class="info-row"><span class="info-label">Data</span><span class="info-value" id="res-data">—</span></div>
        <div class="codigo-cupom">
          <div class="codigo-label">Código do cupom</div>
          <div class="codigo-valor" id="res-codigo">—</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ================================================================
// URL DO APPS SCRIPT
// ================================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdXzKRG0Eg8bCmmeKbgA8Bl-ktHe4icYa8BQYiPr4sza9PP4w-vTewQsPTPnZQEaEY/exec';

// ================================================================
// ESTADO
// ================================================================
let premios     = [];
let nomeAtual   = '';
let lojaAtual   = '';
let pixAtual    = '';
let senhaAtual  = '';
let isSpinning  = false;
let jaGirou     = false;
let anguloAtual = 0;

// Cores PPG: verde, rosa, azul, preto, branco + variações
const CORES = [
  '#00C853','#FF4081','#40C4FF','#1A1A2E','#E040FB',
  '#00BCD4','#FF6D00','#76FF03','#FF1744','#00E5FF'
];

function mostrarTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================================================================
// JSONP
// ================================================================
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb_' + Date.now() + '_' + Math.floor(Math.random() * 99999);
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) { cleanup(); resolve(data); };
    script.onerror = function() { cleanup(); reject(new Error('erro')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

// ================================================================
// TELA 1 — LOGIN
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  ['input-nome','input-loja','input-pix','input-senha'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', e => { if (e.key === 'Enter') validarAcesso(); });
  });
});

async function validarAcesso() {
  const nome  = document.getElementById('input-nome').value.trim();
  const loja  = document.getElementById('input-loja').value.trim();
  const pix   = document.getElementById('input-pix').value.trim();
  const senha = document.getElementById('input-senha').value.trim().toUpperCase();
  const btn   = document.getElementById('btn-entrar');

  document.getElementById('error-login').style.display = 'none';

  if (!nome)  { mostrarErro('Informe seu nome.');   return; }
  if (!loja)  { mostrarErro('Informe sua loja.');   return; }
  if (!pix)   { mostrarErro('Informe seu PIX.');    return; }
  if (!senha) { mostrarErro('Informe a senha.');    return; }

  btn.innerHTML = '<span class="loading"></span>Verificando...';
  btn.disabled  = true;

  try {
    const url = APPS_SCRIPT_URL
      + '?acao=validar'
      + '&senha=' + encodeURIComponent(senha)
      + '&nome='  + encodeURIComponent(nome)
      + '&loja='  + encodeURIComponent(loja)
      + '&pix='   + encodeURIComponent(pix);

    const data = await jsonp(url);

    if (data.ok) {
      nomeAtual  = nome;
      lojaAtual  = loja;
      pixAtual   = pix;
      senhaAtual = senha;
      premios    = data.premios;
      irParaRoleta();
    } else {
      mostrarErro(data.mensagem || 'Senha inválida ou já utilizada.');
      btn.innerHTML = 'Confirmar';
      btn.disabled  = false;
    }
  } catch (e) {
    mostrarErro('Erro de conexão. Tente novamente.');
    console.error(e);
    btn.innerHTML = 'Confirmar';
    btn.disabled  = false;
  }
}

function mostrarErro(msg) {
  const el = document.getElementById('error-login');
  el.textContent   = msg;
  el.style.display = 'block';
}

// ================================================================
// TELA 2 — ROLETA
// ================================================================
function irParaRoleta() {
  document.getElementById('nome-display').textContent = nomeAtual;
  mostrarTela('screen-roleta');
  desenharRoleta(0);
}

function desenharRoleta(angulo) {
  const canvas = document.getElementById('wheel-canvas');
  const ctx    = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const raio   = cx - 4;
  const total  = premios.length;
  if (!total) return;

  const arcSize = (2 * Math.PI) / total;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < total; i++) {
    const inicio = angulo + i * arcSize - Math.PI / 2;
    const fim    = inicio + arcSize;

    // Fatia
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, raio, inicio, fim); ctx.closePath();
    ctx.fillStyle = CORES[i % CORES.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 3; ctx.stroke();

    // Borda interna branca fina
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();

    // Texto
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(inicio + arcSize / 2);
    const emoji = premios[i].emoji || '🎁';
    const label = (premios[i].nome || '').substring(0, 13) + ((premios[i].nome || '').length > 13 ? '…' : '');
    const tx    = raio - 12;
    ctx.textAlign = 'right'; ctx.fillStyle = 'white';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
    ctx.font = 'bold 13px Nunito, sans-serif'; ctx.fillText(label, tx, 5);
    ctx.font = '16px serif'; ctx.shadowBlur = 3;
    ctx.fillText(emoji, tx - ctx.measureText(label).width - 4, 6);
    ctx.restore();
  }

  // Centro escuro
  ctx.beginPath(); ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
  ctx.fillStyle = '#1A1A2E'; ctx.fill();
  ctx.strokeStyle = '#00C853'; ctx.lineWidth = 3; ctx.stroke();
}

function girarRoleta() {
  if (isSpinning || jaGirou) return;
  jaGirou    = true;
  isSpinning = true;
  document.getElementById('btn-spin').disabled = true;

  const premioCerto   = sortearPremio();
  const idx           = premios.findIndex(p => p.nome === premioCerto.nome);
  const arcSize       = (2 * Math.PI) / premios.length;

  const centroSegmento = idx * arcSize + arcSize / 2 - Math.PI / 2;
  const anguloDestino  = -centroSegmento;

  const voltas      = 6 + Math.floor(Math.random() * 4);
  const anguloFinal = anguloAtual
    + (((anguloDestino - anguloAtual) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI))
    + voltas * 2 * Math.PI;

  const duracao = 4500 + Math.random() * 1000;
  const tInicio = performance.now();
  const aInicio = anguloAtual;

  function animar(agora) {
    const t     = Math.min((agora - tInicio) / duracao, 1);
    const ease  = 1 - Math.pow(1 - t, 4);
    anguloAtual = aInicio + (anguloFinal - aInicio) * ease;
    desenharRoleta(anguloAtual);
    if (t < 1) { requestAnimationFrame(animar); }
    else { isSpinning = false; setTimeout(() => mostrarResultado(premioCerto), 700); }
  }
  requestAnimationFrame(animar);
}

function sortearPremio() {
  const total = premios.reduce((s, p) => s + (Number(p.probabilidade) || 1), 0);
  let rand = Math.random() * total;
  for (const p of premios) { rand -= (Number(p.probabilidade) || 1); if (rand <= 0) return p; }
  return premios[premios.length - 1];
}

// ================================================================
// TELA 3 — RESULTADO
// ================================================================
async function mostrarResultado(premio) {
  const codigo  = gerarCodigo();
  const agora   = new Date();
  const dataStr = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

  try {
    const url = APPS_SCRIPT_URL
      + '?acao=registrar'
      + '&senha=' + encodeURIComponent(senhaAtual)
      + '&nome='  + encodeURIComponent(nomeAtual)
      + '&loja='  + encodeURIComponent(lojaAtual)
      + '&pix='   + encodeURIComponent(pixAtual)
      + '&premio='+ encodeURIComponent(premio.nome)
      + '&codigo='+ encodeURIComponent(codigo);
    jsonp(url).catch(() => {});
  } catch(e) {}

  document.getElementById('res-emoji').textContent    = premio.emoji || '🎉';
  document.getElementById('res-premio').textContent   = premio.nome;
  document.getElementById('res-vendedor').textContent = nomeAtual;
  document.getElementById('res-loja').textContent     = lojaAtual;
  document.getElementById('res-pix').textContent      = pixAtual;
  document.getElementById('res-data').textContent     = dataStr;
  document.getElementById('res-codigo').textContent   = codigo;

  mostrarTela('screen-resultado');
  lancarConfetti();
}

function gerarCodigo() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = 'KB-';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function lancarConfetti() {
  const cores = ['#00C853','#FF4081','#40C4FF','#E040FB','#76FF03','#FFD740'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left              = Math.random() * 100 + 'vw';
      el.style.backgroundColor   = cores[Math.floor(Math.random() * cores.length)];
      el.style.width             = (6 + Math.random() * 10) + 'px';
      el.style.height            = (6 + Math.random() * 10) + 'px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}
