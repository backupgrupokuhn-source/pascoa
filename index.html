<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roleta da Páscoa — Grupo Kuhn</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --laranja: #F4721B;
  --laranja-escuro: #C45A0E;
  --marrom: #6B3A1F;
  --creme: #FFF8EE;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Nunito',sans-serif; background:var(--creme); min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse at 20% 0%, #FFE0B2 0%, transparent 50%),
              radial-gradient(ellipse at 80% 100%, #FFCCBC 0%, transparent 50%), var(--creme);
  z-index:0;
}
.egg-deco { position:fixed; font-size:2rem; opacity:0.12; animation:floatEgg 6s ease-in-out infinite; pointer-events:none; z-index:0; }
.egg-deco:nth-child(1){top:5%;left:5%;animation-delay:0s;font-size:2.5rem}
.egg-deco:nth-child(2){top:15%;right:8%;animation-delay:1s;font-size:1.8rem}
.egg-deco:nth-child(3){top:60%;left:3%;animation-delay:2s;font-size:3rem}
.egg-deco:nth-child(4){top:70%;right:5%;animation-delay:.5s;font-size:2rem}
.egg-deco:nth-child(5){bottom:10%;left:15%;animation-delay:1.5s;font-size:2.2rem}
.egg-deco:nth-child(6){bottom:5%;right:20%;animation-delay:3s;font-size:1.5rem}
@keyframes floatEgg { 0%,100%{transform:translateY(0) rotate(-10deg)} 50%{transform:translateY(-15px) rotate(10deg)} }
.container { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:20px 16px 40px; min-height:100vh; }
.header { text-align:center; margin-bottom:24px; animation:slideDown .6s ease; }
@keyframes slideDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
.logo-area { background:var(--laranja); border-radius:20px; padding:14px 20px 10px; display:inline-block; box-shadow:0 6px 20px rgba(244,114,27,.4); margin-bottom:12px; }
.logo-text { font-family:'Fredoka One',cursive; font-size:1rem; color:rgba(255,255,255,.85); letter-spacing:1px; }
.logo-grupo { font-family:'Fredoka One',cursive; font-size:1.8rem; color:white; line-height:1; }
.title-pascoa { font-family:'Fredoka One',cursive; font-size:2.2rem; color:var(--marrom); line-height:1.1; }
.title-pascoa span { color:var(--laranja); }
.subtitle { font-size:.9rem; color:#8B6347; margin-top:4px; font-weight:600; }
.card { background:white; border-radius:24px; padding:28px 24px; box-shadow:0 8px 32px rgba(107,58,31,.12); border:2px solid rgba(244,114,27,.15); }
.card-title { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--marrom); text-align:center; margin-bottom:6px; }
.card-sub { font-size:.85rem; color:#999; text-align:center; margin-bottom:20px; }
.field-group { margin-bottom:16px; }
label { display:block; font-size:.8rem; font-weight:800; color:var(--marrom); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
input[type="text"] { width:100%; padding:14px 16px; border:2px solid #F0E0D0; border-radius:14px; font-size:1.05rem; font-family:'Nunito',sans-serif; font-weight:700; color:var(--marrom); background:#FDFAF7; outline:none; transition:all .2s; }
input[type="text"]:focus { border-color:var(--laranja); background:white; box-shadow:0 0 0 4px rgba(244,114,27,.1); }
input[type="text"]::placeholder { color:#CCC; font-weight:400; }
.btn-primary { width:100%; padding:16px; background:linear-gradient(135deg, var(--laranja), var(--laranja-escuro)); color:white; border:none; border-radius:16px; font-family:'Fredoka One',cursive; font-size:1.3rem; cursor:pointer; box-shadow:0 6px 20px rgba(244,114,27,.4); transition:all .2s; margin-top:8px; }
.btn-primary:active { transform:scale(.97); }
.btn-primary:disabled { background:#CCC; box-shadow:none; cursor:not-allowed; }
.error-msg { background:#FFE8E8; border:1px solid #FFB3B3; border-radius:12px; padding:12px 16px; color:#CC3333; font-size:.9rem; font-weight:700; text-align:center; margin-top:12px; animation:shake .4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.screen { display:none; }
.screen.active { display:block; animation:fadeIn .5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.vendedor-badge { background:linear-gradient(135deg, var(--laranja), #FFB347); border-radius:50px; padding:10px 20px; text-align:center; margin-bottom:20px; box-shadow:0 4px 14px rgba(244,114,27,.3); }
.vendedor-badge span { font-size:.75rem; color:rgba(255,255,255,.85); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.vendedor-badge strong { display:block; font-family:'Fredoka One',cursive; font-size:1.4rem; color:white; line-height:1.1; }
.wheel-container { position:relative; display:flex; flex-direction:column; align-items:center; margin-bottom:20px; }
.wheel-arrow { position:absolute; top:-14px; left:50%; transform:translateX(-50%); z-index:10; filter:drop-shadow(0 3px 6px rgba(0,0,0,.3)); }
.wheel-wrapper { position:relative; width:320px; height:320px; border-radius:50%; box-shadow:0 0 0 6px white, 0 0 0 10px var(--laranja), 0 10px 40px rgba(107,58,31,.25); }
#wheel-canvas { width:320px; height:320px; border-radius:50%; display:block; }
.wheel-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; background:white; border-radius:50%; border:4px solid var(--laranja); display:flex; align-items:center; justify-content:center; font-size:1.6rem; box-shadow:0 4px 12px rgba(0,0,0,.15); z-index:5; }
.btn-spin { width:100%; padding:18px; background:linear-gradient(135deg, #FFD700, #FFA500); color:var(--marrom); border:none; border-radius:16px; font-family:'Fredoka One',cursive; font-size:1.5rem; cursor:pointer; box-shadow:0 6px 20px rgba(255,165,0,.5); transition:all .2s; margin-top:16px; }
.btn-spin:active { transform:scale(.97); }
.btn-spin:disabled { background:#EEE; color:#AAA; box-shadow:none; cursor:not-allowed; }
.resultado-card { background:white; border-radius:24px; overflow:hidden; box-shadow:0 12px 40px rgba(107,58,31,.2); margin-bottom:16px; }
.resultado-header { background:linear-gradient(135deg, var(--laranja), var(--laranja-escuro)); padding:24px 20px; text-align:center; }
.resultado-emoji { font-size:3.5rem; display:block; margin-bottom:4px; animation:bounceIn .6s ease; }
@keyframes bounceIn { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
.resultado-titulo { font-family:'Fredoka One',cursive; font-size:1.2rem; color:white; opacity:.9; }
.resultado-premio { font-family:'Fredoka One',cursive; font-size:1.9rem; color:white; line-height:1.1; margin-top:4px; }
.resultado-body { padding:20px; }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #F5EEE8; font-size:.9rem; }
.info-row:last-child { border-bottom:none; }
.info-label { color:#999; font-weight:700; text-transform:uppercase; font-size:.75rem; letter-spacing:.5px; }
.info-value { font-weight:800; color:var(--marrom); text-align:right; max-width:65%; }
.codigo-cupom { background:#FFF8EE; border:2px dashed var(--laranja); border-radius:12px; padding:14px; text-align:center; margin:16px 0; }
.codigo-label { font-size:.75rem; font-weight:800; color:#999; text-transform:uppercase; letter-spacing:1px; }
.codigo-valor { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--laranja); letter-spacing:3px; }
.loading { display:inline-block; width:18px; height:18px; border:3px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:8px; }
@keyframes spin { to{transform:rotate(360deg)} }
.confetti-piece { position:fixed; top:-10px; border-radius:2px; animation:confettiFall linear forwards; pointer-events:none; z-index:999; }
@keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div class="egg-deco">🌸</div>
<div class="egg-deco">🌷</div>
<div class="egg-deco">🍫</div>
<div class="egg-deco">🌼</div>
<div class="egg-deco">🌺</div>
<div class="egg-deco">🍀</div>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-text">GRUPO</div>
      <div class="logo-grupo">KUHN</div>
    </div>
    <div class="title-pascoa">Roleta da <span>Páscoa</span></div>
    <div class="subtitle">Gire e ganhe um prêmio especial!</div>
  </div>

  <!-- TELA 1: LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="card">
      <div class="card-title">✨ Seu presente te espera</div>
      <div class="card-sub">Preencha os dados para girar a roleta</div>
      <div class="field-group">
        <label>👤 Seu nome</label>
        <input type="text" id="input-nome" placeholder="Como você se chama?" autocomplete="off">
      </div>
      <div class="field-group">
        <label>📍 Sua loja</label>
        <input type="text" id="input-loja" placeholder="Ex: Shopping Manauara" autocomplete="off">
      </div>
      <div class="field-group">
        <label>💸 Seu PIX</label>
        <input type="text" id="input-pix" placeholder="CPF, e-mail ou telefone" autocomplete="off">
      </div>
      <div class="field-group">
        <label>🔑 Senha da campanha</label>
        <input type="text" id="input-senha" placeholder="Ex: COELHO-847" autocomplete="off">
      </div>
      <button class="btn-primary" id="btn-entrar" onclick="validarAcesso()">Confirmar</button>
      <div id="error-login" class="error-msg" style="display:none"></div>
    </div>
  </div>

  <!-- TELA 2: ROLETA -->
  <div id="screen-roleta" class="screen">
    <div class="vendedor-badge">
      <span>Participante</span>
      <strong id="nome-display">—</strong>
    </div>
    <div class="wheel-container">
      <svg class="wheel-arrow" width="40" height="50" viewBox="0 0 40 50">
        <polygon points="20,0 38,38 20,28 2,38" fill="#F4721B" stroke="white" stroke-width="2"/>
        <circle cx="20" cy="38" r="10" fill="#F4721B" stroke="white" stroke-width="2"/>
      </svg>
      <div class="wheel-wrapper">
        <canvas id="wheel-canvas" width="320" height="320"></canvas>
        <div class="wheel-center">🌸</div>
      </div>
    </div>
    <button class="btn-spin" id="btn-spin" onclick="girarRoleta()">GIRAR A ROLETA!</button>
  </div>

  <!-- TELA 3: RESULTADO -->
  <div id="screen-resultado" class="screen">
    <div class="resultado-card">
      <div class="resultado-header">
        <span class="resultado-emoji" id="res-emoji">🎉</span>
        <div class="resultado-titulo">Parabéns! Você ganhou:</div>
        <div class="resultado-premio" id="res-premio">—</div>
      </div>
      <div class="resultado-body">
        <div class="info-row"><span class="info-label">Vendedor</span><span class="info-value" id="res-vendedor">—</span></div>
        <div class="info-row"><span class="info-label">Loja</span><span class="info-value" id="res-loja">—</span></div>
        <div class="info-row"><span class="info-label">PIX</span><span class="info-value" id="res-pix">—</span></div>
        <div class="info-row"><span class="info-label">Data</span><span class="info-value" id="res-data">—</span></div>
        <div class="codigo-cupom">
          <div class="codigo-label">Código do cupom</div>
          <div class="codigo-valor" id="res-codigo">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
// URL DO APPS SCRIPT
// ================================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdXzKRG0Eg8bCmmeKbgA8Bl-ktHe4icYa8BQYiPr4sza9PP4w-vTewQsPTPnZQEaEY/exec';

// ================================================================
// ESTADO
// ================================================================
let premios     = [];
let nomeAtual   = '';
let lojaAtual   = '';
let pixAtual    = '';
let senhaAtual  = '';
let isSpinning  = false;
let jaGirou     = false;
let anguloAtual = 0;

const CORES = ['#F4721B','#FFD700','#FF8C42','#4CAF50','#FF6B9D','#9C27B0','#2196F3','#FF5722','#8BC34A','#F06292'];

function mostrarTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================================================================
// JSONP
// ================================================================
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb_' + Date.now() + '_' + Math.floor(Math.random() * 99999);
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) { cleanup(); resolve(data); };
    script.onerror = function() { cleanup(); reject(new Error('erro')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

// ================================================================
// TELA 1 — LOGIN
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  ['input-nome','input-loja','input-pix','input-senha'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', e => { if (e.key === 'Enter') validarAcesso(); });
  });
});

async function validarAcesso() {
  const nome  = document.getElementById('input-nome').value.trim();
  const loja  = document.getElementById('input-loja').value.trim();
  const pix   = document.getElementById('input-pix').value.trim();
  const senha = document.getElementById('input-senha').value.trim().toUpperCase();
  const btn   = document.getElementById('btn-entrar');

  document.getElementById('error-login').style.display = 'none';

  if (!nome)  { mostrarErro('Informe seu nome.');   return; }
  if (!loja)  { mostrarErro('Informe sua loja.');   return; }
  if (!pix)   { mostrarErro('Informe seu PIX.');    return; }
  if (!senha) { mostrarErro('Informe a senha.');    return; }

  btn.innerHTML = '<span class="loading"></span>Verificando...';
  btn.disabled  = true;

  try {
    const url = APPS_SCRIPT_URL
      + '?acao=validar'
      + '&senha=' + encodeURIComponent(senha)
      + '&nome='  + encodeURIComponent(nome)
      + '&loja='  + encodeURIComponent(loja)
      + '&pix='   + encodeURIComponent(pix);

    const data = await jsonp(url);

    if (data.ok) {
      nomeAtual  = nome;
      lojaAtual  = loja;
      pixAtual   = pix;
      senhaAtual = senha;
      premios    = data.premios;
      irParaRoleta();
    } else {
      mostrarErro(data.mensagem || 'Senha inválida ou já utilizada.');
      btn.innerHTML = 'Confirmar';
      btn.disabled  = false;
    }
  } catch (e) {
    mostrarErro('Erro de conexão. Tente novamente.');
    console.error(e);
    btn.innerHTML = 'Confirmar';
    btn.disabled  = false;
  }
}

function mostrarErro(msg) {
  const el = document.getElementById('error-login');
  el.textContent   = msg;
  el.style.display = 'block';
}

// ================================================================
// TELA 2 — ROLETA
// ================================================================
function irParaRoleta() {
  document.getElementById('nome-display').textContent = nomeAtual;
  mostrarTela('screen-roleta');
  desenharRoleta(0);
}

function desenharRoleta(angulo) {
  const canvas = document.getElementById('wheel-canvas');
  const ctx    = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const raio   = cx - 4;
  const total  = premios.length;
  if (!total) return;

  const arcSize = (2 * Math.PI) / total;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < total; i++) {
    const inicio = angulo + i * arcSize - Math.PI / 2;
    const fim    = inicio + arcSize;

    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, raio, inicio, fim); ctx.closePath();
    ctx.fillStyle = CORES[i % CORES.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();

    ctx.save(); ctx.translate(cx, cy); ctx.rotate(inicio + arcSize / 2);
    const emoji = premios[i].emoji || '🎁';
    const label = (premios[i].nome || '').substring(0, 13) + ((premios[i].nome || '').length > 13 ? '…' : '');
    const tx    = raio - 12;
    ctx.textAlign = 'right'; ctx.fillStyle = 'white';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 3;
    ctx.font = 'bold 13px Nunito, sans-serif'; ctx.fillText(label, tx, 5);
    ctx.font = '16px serif'; ctx.shadowBlur = 2;
    ctx.fillText(emoji, tx - ctx.measureText(label).width - 4, 6);
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  ctx.fillStyle = 'white'; ctx.fill();
}

function girarRoleta() {
  if (isSpinning || jaGirou) return;
  jaGirou    = true;
  isSpinning = true;
  document.getElementById('btn-spin').disabled = true;

  const premioCerto   = sortearPremio();
  const idx           = premios.findIndex(p => p.nome === premioCerto.nome);
  const arcSize       = (2 * Math.PI) / premios.length;

  // Centro do segmento ganhador no referencial da roleta (sem rotação)
  // O segmento i começa em: i * arcSize - PI/2
  // Centro do segmento: i * arcSize + arcSize/2 - PI/2
  // Para a seta (topo = 0) apontar para esse centro, precisamos girar a roleta
  // de forma que esse ângulo fique em 0. Logo anguloDestino = -(centro do segmento)
  const centroSegmento = idx * arcSize + arcSize / 2 - Math.PI / 2;
  const anguloDestino  = -centroSegmento;

  // Normaliza pro intervalo [0, 2PI] e adiciona voltas completas
  const voltas       = 6 + Math.floor(Math.random() * 4);
  const anguloFinal  = anguloAtual
    + (((anguloDestino - anguloAtual) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI))
    + voltas * 2 * Math.PI;

  const duracao  = 4500 + Math.random() * 1000;
  const tInicio  = performance.now();
  const aInicio  = anguloAtual;

  function animar(agora) {
    const t      = Math.min((agora - tInicio) / duracao, 1);
    const ease   = 1 - Math.pow(1 - t, 4);
    anguloAtual  = aInicio + (anguloFinal - aInicio) * ease;
    desenharRoleta(anguloAtual);
    if (t < 1) { requestAnimationFrame(animar); }
    else { isSpinning = false; setTimeout(() => mostrarResultado(premioCerto), 700); }
  }
  requestAnimationFrame(animar);
}

function sortearPremio() {
  const total = premios.reduce((s, p) => s + (Number(p.probabilidade) || 1), 0);
  let rand = Math.random() * total;
  for (const p of premios) { rand -= (Number(p.probabilidade) || 1); if (rand <= 0) return p; }
  return premios[premios.length - 1];
}

// ================================================================
// TELA 3 — RESULTADO
// ================================================================
async function mostrarResultado(premio) {
  const codigo  = gerarCodigo();
  const agora   = new Date();
  const dataStr = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

  try {
    const url = APPS_SCRIPT_URL
      + '?acao=registrar'
      + '&senha=' + encodeURIComponent(senhaAtual)
      + '&nome='  + encodeURIComponent(nomeAtual)
      + '&loja='  + encodeURIComponent(lojaAtual)
      + '&pix='   + encodeURIComponent(pixAtual)
      + '&premio='+ encodeURIComponent(premio.nome)
      + '&codigo='+ encodeURIComponent(codigo);
    jsonp(url).catch(() => {});
  } catch(e) {}

  document.getElementById('res-emoji').textContent    = premio.emoji || '🎉';
  document.getElementById('res-premio').textContent   = premio.nome;
  document.getElementById('res-vendedor').textContent = nomeAtual;
  document.getElementById('res-loja').textContent     = lojaAtual;
  document.getElementById('res-pix').textContent      = pixAtual;
  document.getElementById('res-data').textContent     = dataStr;
  document.getElementById('res-codigo').textContent   = codigo;

  mostrarTela('screen-resultado');
  lancarConfetti();
}

function gerarCodigo() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = 'KB-';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function lancarConfetti() {
  const cores = ['#F4721B','#FFD700','#FF6B9D','#4CAF50','#9C27B0','#2196F3'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left              = Math.random() * 100 + 'vw';
      el.style.backgroundColor   = cores[Math.floor(Math.random() * cores.length)];
      el.style.width             = (8 + Math.random() * 8) + 'px';
      el.style.height            = (8 + Math.random() * 8) + 'px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 35);
  }
}
</script>
</body>
</html>
